<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教室座位 SVG 配置工具 | Falo X Force Cheng</title>
  <meta name="description" content="v-b.203 單檔 HTML 教室座位 SVG 配置工具：固定 3x2 長桌、18 張學生座位、老師講台、工程模式註解、密碼保護案例資料，以及 JSON / Excel 匯入匯出閉環。">
  <meta name="author" content="Falo X Force Cheng">
  <style>
    /* Falo X Force Cheng v-b.203：這份 CSS 是教學版，不只負責美觀，也把 UI 邊界拆成可閱讀的教材段落。 */
    /* Falo X Force Cheng：所有視覺元素保持向量與瀏覽器原生能力，方便 Gemini Canva 或初學者閱讀與重做。 */
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --ink: #1d2433;
      --muted: #667085;
      --line: #d5dbea;
      --accent: #2563eb;
      --accent-dark: #1e40af;
      --teacher: #b91c1c;
      --seat: #eef2ff;
      --seat-line: #9aa8d7;
      --desk: #d8a45f;
      --desk-line: #8a5a22;
      --ok: #087443;
      --radius: 8px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }

    .app {
      width: min(1240px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 32px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(24px, 4vw, 36px);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
    }

    .brand {
      font-weight: 900;
      color: #173b8f;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(640px, 1fr) 340px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
    }

    .stage-panel {
      display: grid;
      gap: 10px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 38px;
      padding: 8px 11px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    button:hover {
      border-color: #93a8d8;
      background: #f8fbff;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 800;
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button.danger {
      color: #b42318;
    }

    button.active {
      background: #eaf1ff;
      border-color: #8cb0ff;
      color: #173b8f;
      font-weight: 900;
    }

    .status {
      min-height: 22px;
      color: var(--ok);
      font-size: 14px;
      font-weight: 800;
    }

    .view-note {
      color: #344054;
      font-size: 14px;
      font-weight: 900;
    }

    .svg-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fdfcf8;
      position: relative;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 760px;
      height: auto;
      user-select: none;
      touch-action: none;
    }

    .room-bg {
      fill: #fffaf0;
    }

    .front-zone {
      fill: #eaf1ff;
      stroke: #b6c7ee;
      stroke-width: 2;
    }

    .podium {
      fill: #f8d5d3;
      stroke: var(--teacher);
      stroke-width: 2;
    }

    .table {
      fill: var(--desk);
      stroke: var(--desk-line);
      stroke-width: 2;
    }

    .seat {
      fill: var(--seat);
      stroke: var(--seat-line);
      stroke-width: 1.5;
      stroke-dasharray: 5 4;
    }

    .seat.is-target {
      fill: #dcfce7;
      stroke: #15803d;
      stroke-width: 3;
      stroke-dasharray: 0;
    }

    .label {
      fill: #344054;
      font-size: 15px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .small-label {
      fill: #667085;
      font-size: 12px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .person {
      cursor: grab;
    }

    .person:active {
      cursor: grabbing;
    }

    .person-card {
      stroke: #1f2937;
      stroke-width: 1.5;
      rx: 8;
      filter: url(#cardShadow);
    }

    .person-name {
      fill: #111827;
      font-size: 16px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .person-role {
      fill: rgba(17, 24, 39, 0.72);
      font-size: 11px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .person.is-dragging .person-card {
      stroke: #2563eb;
      stroke-width: 3;
    }

    .side-panel {
      display: grid;
      gap: 14px;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .name-list {
      display: grid;
      gap: 8px;
    }

    .name-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 72px;
      gap: 8px;
      align-items: center;
    }

    .name-row label {
      color: #344054;
      font-size: 13px;
      font-weight: 900;
    }

    .name-row input,
    .name-row select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 36px;
      padding: 7px 9px;
      color: var(--ink);
      background: #fff;
    }

    .rule-list {
      margin: 0;
      padding-left: 20px;
      color: #344054;
      font-size: 14px;
    }

    .rule-list li + li {
      margin-top: 6px;
    }

    .rules-svg {
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcff;
    }

    .case-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .case-row button {
      min-height: 34px;
      padding: 6px 10px;
      font-size: 14px;
    }

    .rules-title {
      fill: #1d2433;
      font-size: 18px;
      font-weight: 900;
      text-anchor: middle;
    }

    .rules-box {
      fill: #ffffff;
      stroke: #9db2d7;
      stroke-width: 2;
      rx: 8;
    }

    .rules-box.teacher {
      fill: #fff1f2;
      stroke: #dc2626;
    }

    .rules-box.student {
      fill: #eef7ff;
      stroke: #2563eb;
    }

    .rules-box.data {
      fill: #f4fce3;
      stroke: #65a30d;
    }

    .rules-text {
      fill: #344054;
      font-size: 12px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .rules-arrow {
      stroke: #667085;
      stroke-width: 2;
      marker-end: url(#rulesArrow);
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .color-card {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 7px;
      align-items: center;
      min-width: 0;
      color: #344054;
      font-size: 12px;
      font-weight: 800;
    }

    .rgb-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .rgb-row input {
      width: 100%;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid #98a2b3;
    }

    .data-box {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #1f2937;
      background: #fbfcff;
    }

    @media (max-width: 980px) {
      header,
      .layout {
        grid-template-columns: 1fr;
      }

      header {
        align-items: start;
      }

      .brand {
        white-space: normal;
      }
    }
  </style>
</head>
<body data-view="teacher">
  <main class="app">
    <header>
      <div>
        <h1>教室座位 SVG 配置工具</h1>
        <p class="subtitle">v-b.203｜固定 3x2 長桌、18 個學生座位與前方老師講台；預設去識別化，既有範例資料需輸入密碼後才載入。</p>
      </div>
      <div class="brand">Falo X Force Cheng</div>
    </header>

    <section class="layout">
      <section class="panel stage-panel">
        <div class="toolbar">
          <div class="button-row">
            <button class="active" id="teacherViewBtn" type="button">老師視角（站前方看台下 / 可列印）</button>
            <button id="studentViewBtn" type="button">學生視角（坐台下看前方）</button>
            <button class="primary" id="saveBtn" type="button">儲存座位</button>
            <button id="exportBtn" type="button">匯出 JSON</button>
            <button id="importBtn" type="button">匯入覆蓋</button>
            <button id="exportCsvBtn" type="button">匯出 Excel</button>
            <button id="sampleGroupBtn" type="button">案例：載入範例團體</button>
            <button id="resetBtn" class="danger" type="button">重設</button>
          </div>
          <div class="status" id="statusText" aria-live="polite"></div>
        </div>
        <div class="view-note" id="viewNote">老師視角：座位位置旋轉 180 度，但文字保持正向，站在前方看台下時可直接點名或列印。</div>
        <div class="case-row" aria-label="工程模式案件">
          <button type="button" data-case="teacher">案件：老師區域</button>
          <button type="button" data-case="student">案件：學生座位</button>

        <input id="importFile" type="file" accept=".json,.csv,.xls,.xml,text/csv,application/json,application/vnd.ms-excel,text/xml" hidden>

        <div class="svg-wrap">
            <svg id="classroomSvg" viewBox="0 0 960 700" role="img" aria-label="教室座位圖">
            <defs>
              <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#101828" flood-opacity="0.22"></feDropShadow>
              </filter>
            </defs>

            <g id="roomLayer">
              <rect class="room-bg" x="0" y="0" width="960" height="700"></rect>
              <rect class="front-zone" id="frontZone" x="42" y="28" width="876" height="150" rx="8"></rect>
              <text class="label" id="frontLabel" x="480" y="56">教室前方 / 老師區</text>
              <rect class="podium seat" id="seat-teacher" data-seat-id="teacher" data-seat-type="teacher" x="390" y="82" width="180" height="72" rx="8"></rect>
              <text class="label" id="teacherSeatLabel" x="480" y="118">老師講台</text>

              <text class="label" id="studentAreaLabel" x="480" y="214">學生長桌區：3 排 x 2 張長桌，每張桌子 3 個座位</text>

              <g id="furnitureLayer"></g>
              <g id="peopleLayer"></g>
              <g id="caseOverlayLayer"></g>
            </g>
            </svg>
        </div>
      </section>

      <aside class="side-panel">
        <section class="panel">
          <h2>姓名設定</h2>
        <p class="hint">改名字會立即更新 SVG 色卡。姓名空白時人物會消失，座位仍保留。老師只能留在講台，學生只能放到學生座位。</p>
          <div class="name-list" id="nameList"></div>
        </section>

        <section class="panel">
          <h2>圖例</h2>
          <div class="legend">
            <div class="legend-item"><span class="swatch" style="background:#f8d5d3"></span>老師講台</div>
            <div class="legend-item"><span class="swatch" style="background:#d8a45f"></span>固定長桌</div>
            <div class="legend-item"><span class="swatch" style="background:#eef2ff"></span>可放座位</div>
            <div class="legend-item"><span class="swatch" style="background:#dcfce7"></span>拖曳目標</div>
          </div>
        </section>

        <div hidden>
          <div id="colorGrid"></div>
          <textarea id="dataBox" readonly></textarea>
        </div>
      </aside>
    </section>
  </main>

    // Falo X Force Cheng：集中建立 SVG 元素，避免每段程式重複寫 namespace 與 setAttribute。
    function createSvgElement(tag, attrs = {}) {
      const element = document.createElementNS(SVG_NS, tag);
      Object.entries(attrs).forEach(([key, value]) => {
        element.setAttribute(key, value);
      });
      return element;
    }

    // Falo X Force Cheng：座位模型是固定桌椅的資料層；桌子不可拖，學生只改 seatId。
    function buildSeatModel() {
      const seats = [{ id: "teacher", type: "teacher", tableId: "podium", x: 480, y: 118 }];
      const startX = 138;
      const tableGapX = 356;
      const startY = 260;
      const rowGapY = 132;
      const tableWidth = 270;
      const tableHeight = 72;
      const seatWidth = tableWidth / 3;

      for (let row = 1; row <= 3; row += 1) {
        for (let table = 1; table <= 2; table += 1) {
          const tableX = startX + (table - 1) * tableGapX;
          const tableY = startY + (row - 1) * rowGapY;
          for (let seat = 1; seat <= 3; seat += 1) {
            seats.push({
              id: `r${row}t${table}s${seat}`,
              type: "student",
              tableId: `r${row}t${table}`,
              row,
              table,
              seat,
              x: tableX + seatWidth * (seat - 0.5),
              y: tableY + tableHeight / 2
            });
          }
        }
      }
      state.seats = seats;
    }

    // Falo X Force Cheng：老師視角只改顯示座標，底層資料仍維持同一套模型。
    function isTeacherView() {
      return document.body.dataset.view === "teacher";
    }

    // Falo X Force Cheng：老師視角等於把整張教室座標旋轉 180 度，但人物文字仍維持可讀。
    function displayX(x) {
      return isTeacherView() ? 960 - x : x;
    }

    function displayY(y) {
      return isTeacherView() ? 700 - y : y;
    }

    function displayRectX(x, width) {
      return isTeacherView() ? 960 - x - width : x;
    }

    function displayRectY(y, height) {
      return isTeacherView() ? 700 - y - height : y;
    }

    function getDisplaySeat(seat) {
      return { ...seat, x: displayX(seat.x), y: displayY(seat.y) };
    }

    function displayTopLeftFromModel(x, y, width, height) {
      return {
        x: displayRectX(x, width),
        y: displayRectY(y, height)
      };
    }

    function modelTopLeftFromDisplay(x, y, width, height) {
      return {
        x: isTeacherView() ? 960 - x - width : x,
        y: isTeacherView() ? 700 - y - height : y
      };
    }

    function getTeacherDisplayBounds() {
      return {
        x: displayRectX(TEACHER_AREA.x, TEACHER_AREA.width),
        y: displayRectY(TEACHER_AREA.y, TEACHER_AREA.height),
        width: TEACHER_AREA.width,
        height: TEACHER_AREA.height
      };
    }

    // Falo X Force Cheng：靜態教室區塊只受視角影響，不受學生名單或拖曳影響。
    function drawStaticRoom() {
      frontZone.setAttribute("y", displayRectY(TEACHER_AREA.y, TEACHER_AREA.height));
      frontLabel.setAttribute("y", displayY(56));
      document.getElementById("seat-teacher").setAttribute("y", displayRectY(82, 72));
      teacherSeatLabel.setAttribute("y", displayY(118));
      studentAreaLabel.setAttribute("y", displayY(214));
    }

    // Falo X Force Cheng：家具層代表固定實體世界；這層重畫時仍不能被使用者移動。
    function drawFurniture() {
      furnitureLayer.replaceChildren();
      const startX = 138;
      const tableGapX = 356;
      const startY = 260;
      const rowGapY = 132;
      const tableWidth = 270;
      const tableHeight = 72;
      const seatWidth = tableWidth / 3;

      for (let row = 1; row <= 3; row += 1) {
        for (let table = 1; table <= 2; table += 1) {
          const tableX = startX + (table - 1) * tableGapX;
          const displayTableX = displayRectX(tableX, tableWidth);
          const tableY = startY + (row - 1) * rowGapY;
          const displayTableY = displayRectY(tableY, tableHeight);
          const tableId = `r${row}t${table}`;
          const tableGroup = createSvgElement("g", { "data-table-id": tableId });

          tableGroup.appendChild(createSvgElement("rect", {
            class: "table",
            x: displayTableX,
            y: displayTableY,
            width: tableWidth,
            height: tableHeight,
            rx: 8
          }));

          tableGroup.appendChild(createSvgElement("text", {
            class: "small-label",
            x: displayTableX + tableWidth / 2,
            y: isTeacherView() ? displayTableY + tableHeight + 18 : tableY - 16
          })).textContent = `第 ${row} 排 / 第 ${table} 張長桌`;

          for (let seat = 1; seat <= 3; seat += 1) {
            const seatId = `r${row}t${table}s${seat}`;
            const x = tableX + seatWidth * (seat - 1) + 5;
            const displaySeatX = displayRectX(x, seatWidth - 10);
            const displaySeatY = displayRectY(tableY + 8, tableHeight - 16);
            const seatRect = createSvgElement("rect", {
              class: "seat",
              id: `seat-${seatId}`,
              "data-seat-id": seatId,
              "data-seat-type": "student",
              x: displaySeatX,
              y: displaySeatY,
              width: seatWidth - 10,
              height: tableHeight - 16,
              rx: 6
            });
            tableGroup.appendChild(seatRect);

            tableGroup.appendChild(createSvgElement("text", {
              class: "small-label",
              x: displaySeatX + (seatWidth - 10) / 2,
              y: isTeacherView() ? displayTableY - 16 : tableY + tableHeight + 18
            })).textContent = `座位 ${seat}`;
          }

          furnitureLayer.appendChild(tableGroup);
        }
      }
    }

    function getSeat(seatId) {
      return state.seats.find((seat) => seat.id === seatId);
    }

    // Falo X Force Cheng：老師讀 x/y，學生讀 seatId，這裡把兩種座標系轉成畫面位置。
    function getPersonPosition(person) {
      if (person.role === "teacher" && person.x !== undefined && person.y !== undefined) {
        return displayTopLeftFromModel(person.x, person.y, CARD.width, CARD.height);
      }
      const seat = getSeat(person.seatId);
      if (seat) {
        const displaySeat = getDisplaySeat(seat);
        return {
          x: displaySeat.x - CARD.width / 2,
          y: displaySeat.y - CARD.height / 2
        };
      }
      return { x: person.x ?? 40, y: person.y ?? 610 };
    }

    // Falo X Force Cheng：人物層是可動資料卡；姓名空白就不渲染，座位仍然存在。
    function drawPeople() {
      peopleLayer.replaceChildren();
      state.people.filter(isVisiblePerson).forEach((person) => {
        const position = getPersonPosition(person);
        const group = createSvgElement("g", {
          class: "person",
          id: person.id,
          "data-person-id": person.id,
          transform: `translate(${position.x}, ${position.y})`
        });

        group.appendChild(createSvgElement("rect", {
          class: "person-card",
          x: 0,
          y: 0,
          width: CARD.width,
          height: CARD.height,
          fill: person.color
        }));

        group.appendChild(createSvgElement("circle", {
          cx: 17,
          cy: 16,
          r: 9,
          fill: getGenderDotColor(person),
          opacity: 0.9
        }));

        group.appendChild(createSvgElement("text", {
          class: "person-role",
          x: CARD.width / 2,
          y: 12
        })).textContent = person.label;

        group.appendChild(createSvgElement("text", {
          class: "person-name",
          x: CARD.width / 2,
          y: 30
        })).textContent = person.name;

        group.addEventListener("pointerdown", startDrag);
        peopleLayer.appendChild(group);
      });
    }

    // Falo X Force Cheng：右側表單是資料庫編輯器的最小型版本，輸入後立即回寫 state。
    function renderNameInputs() {
      nameList.replaceChildren();
      state.people.forEach((person) => {
        const row = document.createElement("div");
        row.className = "name-row";

        const label = document.createElement("label");
        label.htmlFor = `input-${person.id}`;
        label.textContent = person.label;

        const input = document.createElement("input");
        input.id = `input-${person.id}`;
        input.value = person.name;
        input.autocomplete = "off";
        input.addEventListener("input", () => {
          person.name = input.value.trim();
          drawPeople();
          updateDataBox();
        });

        const genderSelect = document.createElement("select");
        genderSelect.setAttribute("aria-label", `${person.label} 性別`);
        genderSelect.innerHTML = `
          <option value="">未選</option>
          <option value="male">男</option>
          <option value="female">女</option>
        `;
        genderSelect.value = person.gender || "";
        if (person.role === "teacher") {
          genderSelect.disabled = true;
        }
        genderSelect.addEventListener("change", () => {
          person.gender = genderSelect.value;
          drawPeople();
          updateDataBox();
        });

        row.append(label, input, genderSelect);
        nameList.appendChild(row);
      });
    }

    // Falo X Force Cheng：老師小圓點固定綠色；學生依性別顯示不同 OCR 輔助訊號。
    function getGenderDotColor(person) {
      if (person.role === "teacher") return "#16a34a";
      if (person.gender === "male") return "#2563eb";
      if (person.gender === "female") return "#db2777";
      return "#64748b";
    }

    // Falo X Force Cheng：色卡 UI 暫時藏起來，但保留 RGB 可調邏輯與匯出能力，方便進階版接回來。
    function renderColorGrid() {
      colorGrid.replaceChildren();
      colorPalette.forEach((color) => {
        const item = document.createElement("div");
        item.className = "color-card";

        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = color.hex;

        const label = document.createElement("span");
        label.textContent = `${color.id} ${color.hex}`;

        const rgb = hexToRgb(color.hex);
        const rgbRow = document.createElement("div");
        rgbRow.className = "rgb-row";
        ["r", "g", "b"].forEach((channel) => {
          const input = document.createElement("input");
          input.type = "number";
          input.min = "0";
          input.max = "255";
          input.value = rgb[channel];
          input.setAttribute("aria-label", `${color.id} ${channel.toUpperCase()}`);
          input.addEventListener("change", () => {
            rgb[channel] = clamp(Number(input.value) || 0, 0, 255);
            color.hex = rgbToHex(rgb.r, rgb.g, rgb.b);
            updatePeopleColors();
            renderColorGrid();
            drawPeople();
            updateDataBox();
            saveState(false);
          });
          rgbRow.appendChild(input);
        });

        item.append(swatch, label, rgbRow);
        colorGrid.appendChild(item);
      });
    }

    function updatePeopleColors() {
      state.people.forEach((person) => {
        const color = colorPalette.find((item) => item.id === person.colorId);
        if (color) person.color = color.hex;
      });
    }

    function hexToRgb(hex) {
      const value = hex.replace("#", "");
      return {
        r: parseInt(value.slice(0, 2), 16),
        g: parseInt(value.slice(2, 4), 16),
        b: parseInt(value.slice(4, 6), 16)
      };
    }

    function rgbToHex(r, g, b) {
      return `#${[r, g, b].map((value) => clamp(Math.round(value), 0, 255).toString(16).padStart(2, "0")).join("")}`;
    }

    // Falo X Force Cheng：拖曳開始時先保存原座位，後面才有辦法做「交換」而不是疊在一起。
    function startDrag(event) {
      const group = event.currentTarget;
      const personId = group.dataset.personId;
      const person = state.people.find((item) => item.id === personId);
      const point = toRoomPoint(event);
      const current = getPersonPosition(person);

      activeDrag = {
        person,
        group,
        originalSeatId: person.seatId,
        originalX: person.x,
        originalY: person.y,
        offsetX: point.x - current.x,
        offsetY: point.y - current.y
      };

      group.classList.add("is-dragging");
      group.setPointerCapture(event.pointerId);
      group.addEventListener("pointermove", moveDrag);
      group.addEventListener("pointerup", endDrag);
      group.addEventListener("pointercancel", endDrag);
    }

    // Falo X Force Cheng：拖曳過程只更新臨時畫面；老師限制在講台區，學生限制在教室範圍。
    function moveDrag(event) {
      if (!activeDrag) return;
      const point = toRoomPoint(event);
      let x = point.x - activeDrag.offsetX;
      let y = point.y - activeDrag.offsetY;
      if (activeDrag.person.role === "teacher") {
        const bounds = getTeacherDisplayBounds();
        x = clamp(x, bounds.x, bounds.x + bounds.width - CARD.width);
        y = clamp(y, bounds.y, bounds.y + bounds.height - CARD.height);
      } else {
        x = clamp(x, 8, 960 - CARD.width - 8);
        y = clamp(y, 8, 700 - CARD.height - 8);
      }
      activeDrag.group.setAttribute("transform", `translate(${x}, ${y})`);
      const modelPoint = modelTopLeftFromDisplay(x, y, CARD.width, CARD.height);
      activeDrag.person.seatId = null;
      activeDrag.person.x = Math.round(modelPoint.x);
      activeDrag.person.y = Math.round(modelPoint.y);
      if (activeDrag.person.role === "teacher") {
        clearSeatHighlights();
      } else {
        highlightNearestSeat(x + CARD.width / 2, y + CARD.height / 2, activeDrag.person.role);
      }
    }

    // Falo X Force Cheng：放開滑鼠時才提交規則，學生吸附最近座位，老師保留自由 x/y。
    function endDrag(event) {
      if (!activeDrag) return;
      const point = toRoomPoint(event);
      const nearest = activeDrag.person.role === "teacher" ? null : findNearestSeat(point.x, point.y, activeDrag.person.role);
      if (activeDrag.person.role === "teacher") {
        activeDrag.person.seatId = null;
      } else if (nearest) {
        movePersonToSeat(activeDrag.person, nearest.id, activeDrag);
      }
      activeDrag.group.classList.remove("is-dragging");
      activeDrag.group.releasePointerCapture(event.pointerId);
      activeDrag.group.removeEventListener("pointermove", moveDrag);
      activeDrag.group.removeEventListener("pointerup", endDrag);
      activeDrag.group.removeEventListener("pointercancel", endDrag);
      activeDrag = null;
      clearSeatHighlights();
      drawPeople();
      updateDataBox();
    }

    function toRoomPoint(event) {
      const point = svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      return point.matrixTransform(svg.getScreenCTM().inverse());
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function findNearestSeat(x, y, role) {
      const allowedType = role === "teacher" ? "teacher" : "student";
      let best = null;
      let bestDistance = Infinity;
      state.seats
        .filter((seat) => seat.type === allowedType)
        .forEach((seat) => {
          const displaySeat = getDisplaySeat(seat);
          const distance = Math.hypot(displaySeat.x - x, displaySeat.y - y);
          if (distance < bestDistance) {
            bestDistance = distance;
            best = seat;
          }
        });
      return bestDistance <= 92 ? best : null;
    }

    function isVisiblePerson(person) {
      return Boolean(String(person.name || "").trim());
    }

    function findVisiblePersonAtSeat(seatId, excludeId = null) {
      return state.people.find((person) => {
        return person.id !== excludeId && person.seatId === seatId && isVisiblePerson(person);
      });
    }

    // Falo X Force Cheng：已有人時交換 seatId，這是避免疊疊樂的核心規則。
    function movePersonToSeat(person, seatId, dragState) {
      const occupant = findVisiblePersonAtSeat(seatId, person.id);
      if (occupant) {
        occupant.seatId = dragState.originalSeatId || null;
        if (!dragState.originalSeatId) {
          occupant.x = dragState.originalX ?? 40;
          occupant.y = dragState.originalY ?? 610;
        } else {
          delete occupant.x;
          delete occupant.y;
        }
      }
      person.seatId = seatId;
      delete person.x;
      delete person.y;
    }

    function highlightNearestSeat(x, y, role) {
      clearSeatHighlights();
      const nearest = findNearestSeat(x, y, role);
      if (!nearest) return;
      const rect = document.getElementById(`seat-${nearest.id}`);
      if (rect) rect.classList.add("is-target");
    }

    function clearSeatHighlights() {
      document.querySelectorAll(".seat.is-target").forEach((seat) => {
        seat.classList.remove("is-target");
      });
    }

    // Falo X Force Cheng：匯出不是截圖，而是完整資料庫快照，讓 JSON / Excel / OCR 結果能閉環。

          stableOcrColors: 19,

            student: "坐在學生座位看講台，左右方向符合學生或投影視角，也是工程模式註解的標準座標。"

    function getPeopleRows() {
      return state.people.map((person) => ({
        id: person.id,

    function getRuleRows() {

        { id: "rule-03", category: "role_boundary", target: "teacher", rule: "老師只能在老師區域內自由定位，不能移到學生區。" },
        { id: "rule-04", category: "role_boundary", target: "student", rule: "學生只能吸附學生座位。" },

        { id: "rule-08", category: "future", target: "ocr", rule: "進階版可把 OCR 辨識結果轉成同一份 people/seats 資料後回灌。" },
        { id: "rule-09", category: "governance", target: "protected_default_data", rule: "預設去識別化；載入既有範例資料需輸入密碼 20260522 解密，並以全覆蓋方式回寫 people / colors。" }

    }

    function getColorRows() {

    function getViewRows() {
      return [
        { id: "teacher", name: "老師視角", description: "座位位置旋轉 180 度，但文字保持正向，適合站在前方點名或列印。" },
        { id: "student", name: "學生視角", description: "坐在學生座位看講台，左右方向符合學生或投影視角。" }
      ];
    }

    function updateDataBox() {
      dataBox.value = JSON.stringify(getExportData(), null, 2);
    }

    // Falo X Force Cheng：本機儲存是練習便利性，不等同雲端同步或正式資料庫權限。
    function saveState(showMessage = true) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        people: state.people,
        colors: getColorRows(),
        sampleGroupAuthorized: state.sampleGroupAuthorized
      }));
      updateDataBox();
      if (showMessage) showStatus("已儲存到瀏覽器本機。");
    }

    // Falo X Force Cheng：讀取 localStorage 時會檢查 sampleGroupAuthorized，避免舊版明文練習資料自動浮出。
    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const saved = JSON.parse(raw);
        if (Array.isArray(saved.colors)) {
          overwriteColors(saved.colors);
        }
        state.sampleGroupAuthorized = saved.sampleGroupAuthorized === true;
        if (Array.isArray(saved.people)) {
          state.people = defaultPeople.map((defaultPerson) => {
            const savedPerson = saved.people.find((item) => item.id === defaultPerson.id);
            if (!savedPerson) return defaultPerson;
            const mergedPerson = { ...defaultPerson, ...savedPerson };
            if (mergedPerson.id === "student-09" && mergedPerson.name === "學生9") {
              mergedPerson.name = "謝總";
            }
            if (mergedPerson.role === "teacher" && mergedPerson.seatId === "teacher") {
              mergedPerson.seatId = null;
              mergedPerson.x = mergedPerson.x ?? 437;
              mergedPerson.y = mergedPerson.y ?? 95;
            }
            if (/^student-(1[0-8])$/.test(mergedPerson.id) && mergedPerson.name === mergedPerson.label) {
              mergedPerson.name = "";
            }
            if (!["male", "female"].includes(mergedPerson.gender)) {
              mergedPerson.gender = "";
            }
            return mergedPerson;
          });
          if (!state.sampleGroupAuthorized) {
            anonymizeStudents();
          }
          normalizeSeatAssignments();
          updatePeopleColors();
        }
      } catch {
        showStatus("讀取舊資料失敗，已使用預設座位。", true);
      }
    }

    function resetState() {
      localStorage.removeItem(STORAGE_KEY);
      state.sampleGroupAuthorized = false;
      state.people = structuredClone(defaultPeople);
      renderAll();
      showStatus("已重設為預設座位。");
    }

    // Falo X Force Cheng：JSON 匯出提供完整資料包，適合給下一階段 OCR / Vision agent 當 Ground Truth。
    function exportJson() {
      const blob = new Blob([JSON.stringify(getExportData(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `classroom-seat-map-${new Date().toISOString().replaceAll(":", "-")}.json`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      showStatus("已匯出 JSON。");
    }

    // Falo X Force Cheng：密碼按鈕代表授權載入案例資料；資料解密後才覆蓋目前 state。
    async function loadSampleGroupWithPassword() {
      const password = window.prompt("請輸入範例資料載入密碼");
      if (password === null) return;
      const passwordHash = await sha256(password);
      if (passwordHash !== SAMPLE_PASSWORD_HASH) {
        showStatus("密碼錯誤，未載入範例資料。", true);
        return;
      }
      const protectedData = await decryptProtectedDefaultData(password);
      loadProtectedDefaultData(protectedData);
      saveState(false);
      renderAll();
      showStatus("已解密並載入 v-b.203 受保護範例資料。");
    }

    async function sha256(text) {
      const bytes = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return [...new Uint8Array(digest)]
        .map((byte) => byte.toString(16).padStart(2, "0"))
        .join("");
    }

    // Falo X Force Cheng：AES-GCM 解密只在瀏覽器端發生，原始案例資料不以明文存在於 HTML。
    async function decryptProtectedDefaultData(password) {
      const keyBytes = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(password));
      const key = await crypto.subtle.importKey("raw", keyBytes, "AES-GCM", false, ["decrypt"]);
      const encryptedBytes = base64ToBytes(SAMPLE_GROUP_ENCRYPTED.data);
      const iv = base64ToBytes(SAMPLE_GROUP_ENCRYPTED.iv);
      const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, encryptedBytes);
      return JSON.parse(new TextDecoder().decode(decrypted));
    }

    function base64ToBytes(value) {
      return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
    }

    // Falo X Force Cheng：受保護資料包可以同時帶入 people 與 colors，老師位置也會跟著回復。
    function loadProtectedDefaultData(protectedData) {
      state.sampleGroupAuthorized = true;
      const people = Array.isArray(protectedData) ? protectedData : protectedData.people || [];
      const colors = Array.isArray(protectedData) ? [] : protectedData.colors || [];
      overwriteColors(colors);
      overwritePeople(people);
      normalizeSeatAssignments();
      updatePeopleColors();
      setView("student");
      showCaseOverlay("data");
    }

    // Falo X Force Cheng：未授權狀態只保留座位骨架，不顯示學生姓名與性別。
    function anonymizeStudents() {
      state.people.forEach((person) => {
        if (person.role === "student") {
          person.name = "";
          person.gender = "";
        }
      });
    }

    // Falo X Force Cheng：Excel XML 用多工作表呈現資料庫概念，讓非工程背景也能看懂資料關係。
    function exportCsv() {
      const workbook = buildExcelWorkbook();
      downloadTextFile(`classroom-seat-map-${new Date().toISOString().replaceAll(":", "-")}.xls`, workbook, "application/vnd.ms-excel;charset=utf-8");
      showStatus("已匯出多工作表 Excel。");
    }

    function buildExcelWorkbook() {
      const sheets = {
        people: getPeopleRows().map((person) => ({
          id: person.id,
          role: person.role,
          label: person.label,
          name: person.name,
          gender: person.gender,
          genderDotColor: person.genderDotColor,
          colorId: person.colorId,
          color: person.color,
          seatId: person.seatId || "",
          x: person.freePosition?.x ?? "",
          y: person.freePosition?.y ?? ""
        })),
        seats: state.seats,
        colors: getColorRows(),
        rules: getRuleRows(),
        views: getViewRows()
      };

      const worksheets = DB_SHEETS.map((sheet) => {
        const rows = sheets[sheet.name] || [];
        const headers = Object.keys(rows[0] || { id: "", description: "" });
        return `
          <Worksheet ss:Name="${xmlEscape(sheet.name)}">
            <Table>
              ${buildExcelRow(headers)}
              ${rows.map((row) => buildExcelRow(headers.map((header) => row[header] ?? ""))).join("")}
            </Table>
          </Worksheet>
        `;
      }).join("");

      return `<?xml version="1.0"?>
        <?mso-application progid="Excel.Sheet"?>
        <Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
          xmlns:o="urn:schemas-microsoft-com:office:office"
          xmlns:x="urn:schemas-microsoft-com:office:excel"
          xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
          ${worksheets}
        </Workbook>`;
    }

    function buildExcelRow(values) {
      return `<Row>${values.map((value) => `<Cell><Data ss:Type="String">${xmlEscape(value)}</Data></Cell>`).join("")}</Row>`;
    }

    function xmlEscape(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      if (/[",\n]/.test(text)) {
        return `"${text.replaceAll('"', '""')}"`;
      }
      return text;
    }

    function downloadTextFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    // Falo X Force Cheng：匯入採全覆蓋，這能避免「畫面一半新資料、一半舊資料」造成治理混亂。
    function importOverwrite(file) {
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const text = String(reader.result || "");
          const fileName = file.name.toLowerCase();
          const imported = fileName.endsWith(".json")
            ? parseDatabaseFromJson(text)
            : (fileName.endsWith(".xls") || fileName.endsWith(".xml"))
              ? parseDatabaseFromExcelXml(text)
              : { people: parsePeopleFromCsv(text), colors: [] };
          overwriteColors(imported.colors || []);
          overwritePeople(imported.people || []);
          normalizeSeatAssignments();
          updatePeopleColors();
          saveState(false);
          renderAll();
          showStatus("已匯入並全覆蓋目前資料庫。");
        } catch (error) {
          showStatus(`匯入失敗：${error.message}`, true);
        } finally {
          importFile.value = "";
        }
      });
      reader.readAsText(file);
    }

    // Falo X Force Cheng：JSON 可接受完整匯出包，也可接受簡化 people 陣列，方便不同程度學生練習。
    function parseDatabaseFromJson(text) {
      const data = JSON.parse(text);
      const people = Array.isArray(data)
        ? data
        : data.database?.tables?.people || data.people;
      if (!Array.isArray(people)) {
        throw new Error("JSON 需要包含 people 陣列。");
      }
      return {
        people,
        colors: data.database?.tables?.colors || data.colorPalette || data.colors || []
      };
    }

    function parseDatabaseFromExcelXml(text) {
      const doc = new DOMParser().parseFromString(text, "text/xml");
      const parserError = doc.querySelector("parsererror");
      if (parserError) throw new Error("Excel XML 格式無法讀取。");
      return {
        people: readWorksheetRows(doc, "people"),
        colors: readWorksheetRows(doc, "colors")
      };
    }

    function readWorksheetRows(doc, sheetName) {
      const worksheets = [...doc.getElementsByTagNameNS("*", "Worksheet")];
      const sheet = worksheets.find((item) => item.getAttribute("ss:Name") === sheetName || item.getAttribute("Name") === sheetName);
      if (!sheet) return [];
      const rows = [...sheet.getElementsByTagNameNS("*", "Row")].map((row) => {
        return [...row.getElementsByTagNameNS("*", "Cell")].map((cell) => {
          const data = cell.getElementsByTagNameNS("*", "Data")[0];
          return data?.textContent ?? "";
        });
      });
      if (rows.length < 2) return [];
      const headers = rows[0];
      return rows.slice(1).map((row) => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = row[index] ?? "";
        });
        return item;
      });
    }

    function parsePeopleFromCsv(text) {
      const rows = parseCsvRows(text.replace(/^\uFEFF/, ""));
      if (rows.length < 2) {
        throw new Error("CSV 需要標題列與至少一筆人物資料。");
      }
      const headers = rows[0].map((item) => item.trim());
      return rows.slice(1).filter((row) => row.some(Boolean)).map((row) => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = row[index] ?? "";
        });
        return item;
      });
    }

    function parseCsvRows(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }
      row.push(cell);
      rows.push(row);
      return rows.filter((items) => items.length > 1 || items[0] !== "");
    }

    // Falo X Force Cheng：覆蓋人物時只接受既有 id，避免匯入資料偷偷新增超出 18 座位的學生卡。
    function overwritePeople(importedPeople) {
      const seatIds = new Set(state.seats.map((seat) => seat.id));
      state.people = defaultPeople.map((defaultPerson) => {
        const imported = importedPeople.find((item) => item.id === defaultPerson.id);
        if (!imported) return structuredClone(defaultPerson);
        const color = colorPalette.find((item) => item.id === imported.colorId);
        const nextPerson = {
          ...defaultPerson,
          name: Object.prototype.hasOwnProperty.call(imported, "name") ? String(imported.name || "").trim() : defaultPerson.name,
          gender: ["male", "female"].includes(imported.gender) ? imported.gender : (defaultPerson.gender || ""),
          colorId: color ? color.id : defaultPerson.colorId,
          color: color ? color.hex : (imported.color || defaultPerson.color)
        };
        if (imported.seatId && seatIds.has(imported.seatId)) {
          nextPerson.seatId = imported.seatId;
          delete nextPerson.x;
          delete nextPerson.y;
        } else {
          nextPerson.seatId = null;
          const freePosition = imported.freePosition && typeof imported.freePosition === "object"
            ? imported.freePosition
            : {};
          const importedX = imported.x ?? freePosition.x;
          const importedY = imported.y ?? freePosition.y;
          const fallbackX = defaultPerson.role === "teacher" ? 437 : 40;
          const fallbackY = defaultPerson.role === "teacher" ? 95 : 610;
          nextPerson.x = Number(importedX) || fallbackX;
          nextPerson.y = Number(importedY) || fallbackY;
        }
        return nextPerson;
      });
    }

    // Falo X Force Cheng：色卡可用 hex 或 RGB 匯入，讓 Excel 與 JSON 都能形成同一個閉環。
    function overwriteColors(importedColors) {
      if (!Array.isArray(importedColors)) return;
      importedColors.forEach((imported) => {
        const color = colorPalette.find((item) => item.id === imported.id);
        if (!color) return;
        if (imported.hex) {
          color.hex = normalizeHex(imported.hex, color.hex);
        } else if (imported.r !== undefined || imported.g !== undefined || imported.b !== undefined) {
          color.hex = rgbToHex(Number(imported.r) || 0, Number(imported.g) || 0, Number(imported.b) || 0);
        }
        if (imported.name) color.name = String(imported.name);
      });
    }

    function normalizeHex(value, fallback) {
      const text = String(value || "").trim();
      return /^#[0-9a-fA-F]{6}$/.test(text) ? text.toLowerCase() : fallback;
    }

    // Falo X Force Cheng：正規化負責最後守門，處理重複座位、錯誤 seatId 與老師區域邊界。
    function normalizeSeatAssignments() {
      const occupied = new Set();
      state.people.filter(isVisiblePerson).forEach((person) => {
        if (person.role === "teacher" && person.seatId === null) {
          person.x = clamp(Number(person.x) || TEACHER_AREA.x, TEACHER_AREA.x, TEACHER_AREA.x + TEACHER_AREA.width - CARD.width);
          person.y = clamp(Number(person.y) || TEACHER_AREA.y, TEACHER_AREA.y, TEACHER_AREA.y + TEACHER_AREA.height - CARD.height);
          return;
        }
        const seat = getSeat(person.seatId);
        if (!seat || seat.type !== person.role || occupied.has(person.seatId)) {
          const nextSeat = state.seats.find((candidate) => {
            return candidate.type === person.role && !occupied.has(candidate.id);
          });
          person.seatId = nextSeat ? nextSeat.id : null;
          delete person.x;
          delete person.y;
        }
        if (person.seatId) occupied.add(person.seatId);
      });
    }

    // Falo X Force Cheng：切換視角只改顯示邏輯，不改資料本體，這是 Ground Truth 工具的重要邊界。
    function setView(view) {
      document.body.dataset.view = view;
      teacherViewBtn.classList.toggle("active", view === "teacher");
      studentViewBtn.classList.toggle("active", view === "student");
      viewNote.textContent = view === "teacher"
        ? "老師視角：座位位置旋轉 180 度，但文字保持正向，站在前方看台下時可直接點名或列印。"
        : "學生視角：坐在台下看前方，左右方向符合學生或投影畫面。";
      roomLayer.setAttribute("transform", "");
      localStorage.setItem(`${STORAGE_KEY}_view`, view);
      drawStaticRoom();
      drawFurniture();
      drawPeople();
      updateDataBox();
    }

    function showStatus(message, isWarning = false) {
      statusText.textContent = message;
      statusText.style.color = isWarning ? "#b42318" : "var(--ok)";
      window.clearTimeout(showStatus.timer);
      showStatus.timer = window.setTimeout(() => {
        statusText.textContent = "";
      }, 2400);
    }

    function renderAll() {
      drawStaticRoom();
      drawFurniture();
      drawPeople();
      renderNameInputs();
      renderColorGrid();
      updateDataBox();
    }

    // Falo X Force Cheng：啟動順序是先建立固定座位，再讀取資料，最後渲染畫面。
    buildSeatModel();
    loadState();
    renderAll();

    document.getElementById("saveBtn").addEventListener("click", () => saveState(true));
    document.getElementById("exportBtn").addEventListener("click", exportJson);
    document.getElementById("exportCsvBtn").addEventListener("click", exportCsv);
    document.getElementById("importBtn").addEventListener("click", () => importFile.click());
    document.getElementById("sampleGroupBtn").addEventListener("click", loadSampleGroupWithPassword);
    importFile.addEventListener("change", () => {
      const file = importFile.files?.[0];
      if (file) importOverwrite(file);
    });
    document.getElementById("resetBtn").addEventListener("click", resetState);
    teacherViewBtn.addEventListener("click", () => setView("teacher"));
    studentViewBtn.addEventListener("click", () => setView("student"));
    document.querySelectorAll("[data-case]").forEach((button) => {
      button.addEventListener("click", () => {
        if (button.dataset.case !== "clear") {
          setView("student");
        }
        showCaseOverlay(button.dataset.case);
      });
    });
    setView(localStorage.getItem(`${STORAGE_KEY}_view`) || "teacher");
    window.addEventListener("beforeunload", () => saveState(false));
  </script>
</body>
